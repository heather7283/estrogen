# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Download dependencies
        run: |
          go mod vendor

      - name: Build binary
        run: |
          CGO_ENABLED=0 go build -trimpath -o estrogen
        # Adjust the binary name and main package path as needed

      - name: Create vendor tarball
        run: |
          VER="$(echo "${{ github.ref }}" | sed 's|^refs/tags/v||')"
          DIR="estrogen-${VER}"
          mkdir -p "${DIR}"
          mv vendor "${DIR}"
          ARCHIVE="${DIR}-vendor.tar.xz"
          tar -cJf "${ARCHIVE}" "${DIR}"
          echo "VENDOR_TARBALL=${ARCHIVE}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            estrogen
            ${{ env.VENDOR_TARBALL }}
          generate_release_notes: true

