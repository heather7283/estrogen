# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Download dependencies
        run: |
          go mod vendor

      - name: Build binary
        run: |
          CGO_ENABLED=0 go build -trimpath -o estrogen
        # Adjust the binary name and main package path as needed

      - name: Create vendor tarball
        run: |
          # Gentoo expects: <module>-<version>-vendor.tar.xz
          # containing a top-level "vendor/" directory
          VENDOR_NAME="estrogen-$(echo "${{ github.ref }}" | sed 's|^refs/tags/v||')-vendor"
          mkdir -p "${VENDOR_NAME}"
          cp -r vendor "${VENDOR_NAME}/"
          tar -cJf "${VENDOR_NAME}.tar.xz" "${VENDOR_NAME}"
          echo "VENDOR_TARBALL=${VENDOR_NAME}.tar.xz" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            estrogen
            ${{ env.VENDOR_TARBALL }}
          generate_release_notes: true

